<!DOCTYPE html>
<html>
<head>
  <title>VEXO AI</title>
</head>
<body>

<h1>VEXO AI 🚀</h1>

<input type="text" id="productInput" placeholder="Ürün gir">

<button onclick="generateText()">
Açıklama Oluştur
</button>

<p id="result"></p>

<script>
async function generateText() {

  const product = document.getElementById("productInput").value;

  const response = await fetch("https://vexo-backend-1.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      text: product
    })
  });

  const data = await response.json();

  document.getElementById("result").innerText =
    data.result;
}
</script>

</body>
</html>
